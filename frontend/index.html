<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blogora</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Particles -->
<div id="particles-js"></div>

<!-- Hero -->
<div class="hero-text">
  🚀 Blogora  
  <div class="subtitle">Write. Share. Inspire.</div>
</div>

<!-- Card -->
<div class="glass-card">

  <!-- Toggle -->
  <div class="toggle-buttons mb-3">
    <button onclick="showLogin()" id="loginBtn" class="active">Login</button>
    <button onclick="showRegister()" id="registerBtn">Register</button>
  </div>

  <!-- Login -->
  <div id="loginForm">
    <div class="form-floating mb-3">
      <input id="loginUsername" class="form-control" placeholder="Username">
      <label>Username</label>
    </div>

    <div class="form-floating mb-3">
      <input id="loginPassword" type="password" class="form-control" placeholder="Password">
      <label>Password</label>
    </div>

    <button onclick="login()" class="btn btn-custom">Login</button>
  </div>

  <!-- Register -->
  <div id="registerForm" style="display:none;">
    <div class="form-floating mb-3">
      <input id="regUsername" class="form-control" placeholder="Username">
      <label>Username</label>
    </div>

    <div class="form-floating mb-3">
      <input id="regPassword" type="password" class="form-control" placeholder="Password">
      <label>Password</label>
    </div>

    <button onclick="register()" class="btn btn-outline-light w-100">Register</button>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="app.js"></script>

</body>
</html>
