<!DOCTYPE html>
<html>
<head>
  <title>Blogora Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="text-center">🚀 Blogora Dashboard</h2>
  <button onclick="toggleDark()" class="btn btn-dark mb-3">🌙 Toggle Dark Mode</button>

  <!-- Create Post -->
  <div class="card p-3 mb-4">
    <input type="text" id="searchInput" placeholder="Search blogs..." />
    <button onclick="searchPosts()">Search</button>
    <h4>Create Post</h4>
    <input id="title" class="form-control mb-2" placeholder="Title">
    <input id="category" class="form-control mb-2" placeholder="Category">
    <input id="tags" class="form-control mb-2" placeholder="Tags (comma separated)">
    <div id="editor" style="height:150px;"></div>
    <button onclick="createPost()" class="btn btn-primary w-100">Publish</button>
    <button onclick="generateTags()" class="btn btn-info mb-2">🤖 Suggest Tags</button>
  </div>

  <!-- Analytics -->
  <div class="card p-3 mb-4">
    <h4>📊 Analytics</h4>
     <p>Total Posts: <span id="totalPosts">0</span></p>
     <p>Total Users: <span id="totalUsers">0</span></p>
     <p>Total Comments: <span id="totalComments">0</span></p>
  </div>

  <!-- Posts -->
  <div id="posts"></div>

</div>

<script src="app.js"></script>
<script>
  const quill = new Quill('#editor', {
    theme: 'snow'
  });
</script>
</body>
</html>
